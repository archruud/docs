<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Archruud Dokumentasjon</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="description" content="Teknisk dokumentasjon - Arch Linux, Proxmox, Nettverk, AI">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Dark theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css">

  <style>
    :root {
      --theme-color: #7c3aed;
      --sidebar-width: 280px;
    }
  </style>
</head>
<body>
  <div id="app">Laster dokumentasjon...</div>

  <script>
    window.$docsify = {
      name: '📚 Archruud Docs',
      repo: 'https://github.com/archruud/docs',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      homepage: 'README.md',

      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '🔍 Søk i dokumentasjonen...',
        noData: 'Ingen resultater funnet',
        depth: 4,
      },

      copyCode: {
        buttonText: '📋 Kopier',
        errorText: 'Feil',
        successText: '✓ Kopiert!'
      },

      'flexible-alerts': {
        style: 'flat'
      },

      themeColor: '#7c3aed',

      darkMode: {
        light: {
          toggleBtnBg: '#34495e'
        }
      }
    }
  </script>

  <!-- Docsify core -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

  <!-- Plugins -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="//unpkg.com/docsify-plugin-flexible-alerts"></script>

  <!-- Dark/light toggle -->
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>

  <!-- Syntax highlighting -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Archruud's Dokumentasjon</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="description" content="Teknisk dokumentasjon - Arch Linux, Proxmox, Nettverk, AI">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- docsify-themeable Simple Dark -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">

  <!-- Sidebar Collapse CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css">

  <style>
    :root {
      --theme-color: #7c3aed;
      --base-font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --code-font-family: 'JetBrains Mono', 'Courier New', monospace;
      --base-font-size: 15px;
      --sidebar-width: 17rem;
      --sidebar-background: #0d1117;
      --base-background-color: #161b22;
      --cover-background-color: #0d1117;
      --heading-color: #e6edf3;
      --text-color-base: #c9d1d9;
      --text-color-secondary: #8b949e;
      --code-background: #1c2128;
      --code-theme-background: #1c2128;
      --code-inline-background: #1c2128;
      --sidebar-nav-link-color: #c9d1d9;
      --sidebar-nav-link-color--hover: #7c3aed;
      --sidebar-nav-link-color--active: #7c3aed;
    }
  </style>
</head>
<body>
  <div id="app">Laster dokumentasjon...</div>

  <script>
    window.$docsify = {
      name: '📚 Archruud Docs',
      repo: 'https://github.com/archruud/docs',
      loadSidebar: '_sidebar.md',
      subMaxLevel: 2,
      auto2top: true,
      homepage: 'README.md',

      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '🔍 Søk i dokumentasjonen...',
        noData: 'Ingen resultater funnet',
        depth: 4,
      },

      copyCode: {
        buttonText: '📋 Kopier',
        errorText: 'Feil',
        successText: '✓ Kopiert!'
      },

      pagination: {
        previousText: '← Forrige',
        nextText: 'Neste →',
        crossChapter: true,
      },

      'flexible-alerts': {
        style: 'flat'
      }
    }
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://unpkg.com/docsify-plugin-flexible-alerts"></script>

  <!-- docsify-themeable -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>

  <!-- Syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-ini.min.js"></script>
</body>
</html>
